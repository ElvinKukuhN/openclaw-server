version: "3.9"

services:

  # ── OpenClaw Gateway ─────────────────────────────────────────────
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    expose:
      - "18789"          # tidak expose langsung ke publik, lewat Nginx
    volumes:
      - openclaw-data:/root/.openclaw
      - ./workspace:/root/workspace
      - ./config:/root/.openclaw/config
      - ./logs/openclaw:/root/.openclaw/logs
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - openclaw-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── OpenClaw CLI (jalankan on-demand) ────────────────────────────
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - openclaw-data:/root/.openclaw
      - ./workspace:/root/workspace
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    profiles:
      - cli
    entrypoint: ["node", "dist/index.js"]
    restart: "no"

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: openclaw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - openclaw-gateway
    networks:
      - openclaw-internal
      - openclaw-public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (SSL otomatis) ───────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: openclaw-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    profiles:
      - ssl
    restart: "no"

  # ── Watchtower (auto-update image) ──────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: openclaw-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=86400          # cek setiap 24 jam
      - WATCHTOWER_CLEANUP=true                  # hapus image lama
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=${WATCHTOWER_MONITOR_ONLY:-false}
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${TELEGRAM_WATCHTOWER_URL:-}
    networks:
      - openclaw-internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  openclaw-data:
    driver: local
  certbot-webroot:
    driver: local
  certbot-certs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
networks:
  openclaw-internal:
    driver: bridge
    internal: true          # tidak bisa akses internet langsung
  openclaw-public:
    driver: bridge