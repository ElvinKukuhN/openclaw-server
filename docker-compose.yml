# version: "3.9"

services:

  # ── OpenClaw Gateway ─────────────────────────────────────────────
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"    # Buka port agar bisa diakses Nginx luar
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
      - ./config:/home/node/.openclaw/config
      - ./logs/openclaw:/home/node/.openclaw/logs
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
      - OPENCLAW_CONFIG_PATH=/home/node/.openclaw/config/openclaw.json
      - GATEWAY_CONTROLUI_ALLOWEDORIGINS=*
      - GATEWAY_TRUSTEDPROXIES=any
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - openclaw-internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── OpenClaw CLI (jalankan on-demand) ────────────────────────────
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GATEWAY_TOKEN=${GATEWAY_TOKEN}
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    profiles:
      - cli
    entrypoint: ["node", "dist/index.js"]
    restart: "no"

  # ── Watchtower (auto-update image) ──────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: openclaw-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=86400          # cek setiap 24 jam
      - WATCHTOWER_CLEANUP=true                  # hapus image lama
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_MONITOR_ONLY=${WATCHTOWER_MONITOR_ONLY:-false}
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=${TELEGRAM_WATCHTOWER_URL:-}
    networks:
      - openclaw-internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

# ── Volumes ──────────────────────────────────────────────────────
volumes:
  openclaw-data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────
networks:
  openclaw-internal:
    driver: bridge
    internal: false          # Harus false agar bisa konek ke API MiniMax