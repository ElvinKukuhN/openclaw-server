# ── HTTP: redirect ke HTTPS + challenge certbot ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: reverse proxy ke OpenClaw Gateway ─────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN_OR_IP;          # ← ganti dengan domain/IP kamu

    # SSL Certificate (dari Certbot)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_OR_IP/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_OR_IP/privkey.pem;

    # Rate limiting
    limit_req zone=openclaw burst=10 nodelay;
    limit_conn addr 20;

    # ── Proxy ke OpenClaw Gateway ─────────────────────────────────
    location / {
        proxy_pass         http://openclaw-gateway:18789;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     300s;   # lebih lama untuk streaming response

        # Buffer
        proxy_buffering    off;        # matikan untuk streaming/SSE
        proxy_cache        off;
    }

    # ── Health check endpoint ─────────────────────────────────────
    location /health {
        proxy_pass http://openclaw-gateway:18789/health;
        access_log off;
        proxy_set_header Host $host;
    }
}